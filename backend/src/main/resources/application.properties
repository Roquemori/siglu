# PostgreSQL Configuration
# Modificado para Podman: se apunta al servicio 'db' en lugar de 'localhost'
spring.datasource.url=jdbc:postgresql://siglu-db:5432/siglu_db
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:-86400000}

# Server Configuration - Puerto 8080
server.port=8080

# Logging
logging.level.com.siglu=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate=WARN
logging.level.org.hibernate.tool.schema=OFF

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:-http://localhost}
