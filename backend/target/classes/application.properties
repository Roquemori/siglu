# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/siglu_db
spring.datasource.username=siglu_user
spring.datasource.password=siglu_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=siglu-secret-key-256bits-minimum-for-jwt-2024-secure
jwt.expiration=86400000

# Server Configuration - Puerto 8080
server.port=8080

# Logging
logging.level.com.siglu=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate=WARN
logging.level.org.hibernate.tool.schema=OFF

# CORS
cors.allowed-origins=http://localhost:5173,http://localhost:3000
