server {
    # IMPORTANTE: Escucha en 80 porque es el puerto interno del contenedor
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Compresión para mejorar rendimiento
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Proxy API → backend
    location /api/ {
        # IMPORTANTE: Asegúrate de que 'backend' sea el nombre del servicio en tu podman-compose
        proxy_pass         http://siglu-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        
        # Estas líneas ayudan a evitar bloqueos de seguridad
        proxy_redirect off;
        
        client_max_body_size 12M;
    }

    # SPA (React) — redirigir cualquier ruta desconocida al index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check para el contenedor
    location /health {
        access_log off;
        return 200 '{"status":"UP"}';
        add_header Content-Type application/json;
    }
}
